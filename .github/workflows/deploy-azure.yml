name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: photoalbum-rg
  AZURE_LOCATION: eastus
  APP_NAME: photoalbum

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Infrastructure with Bicep
      id: deploy-infra
      run: |
        az group create --name $AZURE_RESOURCE_GROUP --location $AZURE_LOCATION --output none
        
        RESULT=$(az deployment group create \
          --resource-group $AZURE_RESOURCE_GROUP \
          --template-file infra/main.bicep \
          --parameters infra/parameters.json \
          --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
                       postgresAppPassword="${{ secrets.POSTGRES_APP_PASSWORD }}" \
          --output json)
        
        echo "acr_name=$(echo $RESULT | jq -r '.properties.outputs.acrName.value')" >> $GITHUB_OUTPUT
        echo "acr_login_server=$(echo $RESULT | jq -r '.properties.outputs.acrLoginServer.value')" >> $GITHUB_OUTPUT
        echo "container_app_name=$(echo $RESULT | jq -r '.properties.outputs.containerAppName.value')" >> $GITHUB_OUTPUT
        echo "app_url=$(echo $RESULT | jq -r '.properties.outputs.containerAppUrl.value')" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image to ACR
      run: |
        az acr login --name ${{ steps.deploy-infra.outputs.acr_name }}
        docker build -t ${{ steps.deploy-infra.outputs.acr_login_server }}/${{ env.APP_NAME }}:${{ github.sha }} .
        docker push ${{ steps.deploy-infra.outputs.acr_login_server }}/${{ env.APP_NAME }}:${{ github.sha }}
        docker tag ${{ steps.deploy-infra.outputs.acr_login_server }}/${{ env.APP_NAME }}:${{ github.sha }} \
                   ${{ steps.deploy-infra.outputs.acr_login_server }}/${{ env.APP_NAME }}:latest
        docker push ${{ steps.deploy-infra.outputs.acr_login_server }}/${{ env.APP_NAME }}:latest

    - name: Update Container App
      run: |
        az containerapp update \
          --name ${{ steps.deploy-infra.outputs.container_app_name }} \
          --resource-group $AZURE_RESOURCE_GROUP \
          --image ${{ steps.deploy-infra.outputs.acr_login_server }}/${{ env.APP_NAME }}:${{ github.sha }} \
          --output none

    - name: Show Application URL
      run: echo "Application deployed to ${{ steps.deploy-infra.outputs.app_url }}"
