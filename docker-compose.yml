services:
  # Azure SQL Edge service (lightweight SQL Server compatible for Docker)
  sqlserver-db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: photoalbum-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=PhotoAlbum@123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - photoalbum-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P PhotoAlbum@123 -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

  # Photo Album Java Application  
  photoalbum-java-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photoalbum-java-app
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver-db:1433;database=photoalbum;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=PhotoAlbum@123
    ports:
      - "8080:8080"
    depends_on:
      sqlserver-db:
        condition: service_healthy
    networks:
      - photoalbum-network
    restart: on-failure

volumes:
  sqlserver_data:

networks:
  photoalbum-network:
    driver: bridge
