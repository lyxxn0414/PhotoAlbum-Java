# Azure Deployment Profile
# Uses H2 in-memory database with SQL Server compatibility mode

server.port=8080

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# H2 Database Configuration (SQL Server compatibility mode)
spring.datasource.url=jdbc:h2:file:/tmp/photoalbum-db;MODE=MSSQLServer;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=photoalbum
spring.datasource.password=photoalbum
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Application Configuration - File Upload Validation
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Logging (reduced for production)
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
