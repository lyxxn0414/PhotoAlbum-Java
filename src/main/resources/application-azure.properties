# =============================================================
# Azure Profile Configuration
# Active when SPRING_PROFILES_ACTIVE=azure
# Uses Azure Managed Identity for passwordless PostgreSQL auth.
# =============================================================

# Server
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# PostgreSQL with Azure AD Managed Identity (passwordless)
# Service Connector automatically sets: spring.datasource.url, spring.datasource.username,
# spring.datasource.azure.passwordless-enabled, spring.cloud.azure.credential.client-id,
# spring.cloud.azure.credential.managed-identity-enabled as environment variables.
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Actuator health endpoints (for Azure Container Apps health probes)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Logging
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
