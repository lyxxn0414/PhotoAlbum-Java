# Azure PostgreSQL Flexible Server configuration
# Connection string from environment variable
spring.datasource.url=${AZURE_POSTGRESQL_CONNECTION_STRING:jdbc:postgresql://localhost:5432/photoalbum}
spring.datasource.username=${AZURE_POSTGRESQL_USERNAME:photoalbum}
spring.datasource.password=${AZURE_POSTGRESQL_PASSWORD:photoalbum}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Azure-specific settings
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
